# GitLab CI/CD 설정 파일
image: node:20 # 기본 이미지 (Linux 빌드용)

stages:
  - build
  - release

# 캐시 설정: 빌드 속도를 높이기 위해 node_modules를 저장합니다.
cache:
  paths:
    - node_modules/

# 1. Linux 빌드
build-linux:
  stage: build
  script:
    - npm install
    - npm run dist:release -- --linux
  artifacts:
    paths:
      - dist/*.AppImage
    expire_in: 1 month
  only:
    - tags

# 2. Windows 빌드 (Linux 환경에서 Wine을 사용해 빌드)
build-windows:
  stage: build
  image: electronuserland/builder:wine # Windows 빌드를 위한 Wine 포함 이미지
  script:
    - npm install
    - npm run dist:release -- --win
  artifacts:
    paths:
      - dist/*.exe
    expire_in: 1 month
  only:
    - tags

# 3. macOS 빌드 (로컬 macOS 러너 사용)
build-macos:
  stage: build
  tags:
    - macos # 로컬에 등록한 러너의 태그와 일치해야 합니다.
  script:
    - npm install
    - npm run dist:release -- --mac
  artifacts:
    paths:
      - dist/*.dmg
    expire_in: 1 month
  only:
    - tags

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  only:
    - tags
  # Download artifacts from build jobs and attach them to the release
  dependencies:
    - build-linux
    - build-windows
    - build-macos
  script:
    - echo "Artifacts in workspace:"
    - ls -la dist || true
    - |
      # Create release and attach any built artifacts found in dist/
      # release-cli supports attaching local files via --assets-link with filepath
      CMD=(release-cli create --name "$CI_PROJECT_TITLE $CI_COMMIT_TAG" --tag-name "$CI_COMMIT_TAG" --description "Release $CI_COMMIT_TAG")
      for f in dist/*; do
        [ -f "$f" ] || continue
        BASENAME=$(basename "$f")
        CMD+=(--assets-link "name=$BASENAME;filepath=$f")
      done
      echo "Running: ${CMD[*]}"
      "${CMD[@]}"
  release:
    name: "$CI_PROJECT_TITLE $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    description: |
      Release $CI_COMMIT_TAG

      ### ⚠️ Security Warning (필독 / Please Read)

      **English:**
      This program is distributed by an individual developer and is not signed with a paid code signing certificate. The security warning you may see is not a defect. Please follow the instructions below to run the application.

      *   **Windows:** Click **\[More info\]** on the blue warning screen → Click **\[Run anyway\]**
      *   **macOS:** **Right-click (or Control+click)** the app file → Select **\[Open\]** → Click **\[Open\]** again

      **한국어:**
      본 프로그램은 개인 개발자가 배포하는 오픈소스 소프트웨어로, 유료 개발자 인증서 서명이 되어 있지 않습니다. 실행 시 발생하는 보안 경고는 프로그램의 결함이 아니니 아래 방법으로 실행해 주세요.

      *   **Windows:** 파란색 경고창에서 **[추가 정보]** 클릭 -> **[실행]** 버튼 클릭
      *   **macOS:** 앱 파일 위에서 **마우스 오른쪽 버튼(또는 Control+클릭)** -> **[열기]** 선택 -> 다시 한번 **[열기]** 클릭

      Built release artifacts are available in pipeline jobs.

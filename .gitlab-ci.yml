# GitLab CI/CD 설정 파일
image: node:20 # 기본 이미지 (Linux 빌드용)

stages:
  - build
  - release

# 캐시 설정: 빌드 속도를 높이기 위해 node_modules를 저장합니다.
cache:
  paths:
    - node_modules/

# 1. Linux 빌드
build-linux:
  stage: build
  script:
    - npm install
    - npm run dist:release -- --linux
  artifacts:
    paths:
      - dist/*.AppImage
    expire_in: 1 month
  only:
    - master
    - tags

# 2. Windows 빌드 (Linux 환경에서 Wine을 사용해 빌드)
build-windows:
  stage: build
  image: electronuserland/builder:wine # Windows 빌드를 위한 Wine 포함 이미지
  script:
    - npm install
    - npm run dist:release -- --win
  artifacts:
    paths:
      - dist/*.exe
    expire_in: 1 month
  only:
    - master
    - tags

# 3. macOS 빌드 (로컬 macOS 러너 사용)
build-macos:
  stage: build
  tags:
    - macos # 로컬에 등록한 러너의 태그와 일치해야 합니다.
  script:
    - npm install
    - npm run dist:release -- --mac
  artifacts:
    paths:
      - dist/*.dmg
    expire_in: 1 month
  only:
    - master
    - tags

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  only:
    - tags
  # Download artifacts from build jobs and attach them to the release
  dependencies:
    - build-linux
    - build-windows
    - build-macos
  script:
    - echo "Artifacts in workspace:"
    - ls -la dist || true
    - |
      # Create release and attach any built artifacts found in dist/
      # release-cli supports attaching local files via --assets-link with filepath
      CMD=(release-cli create --name "$CI_PROJECT_TITLE $CI_COMMIT_TAG" --tag-name "$CI_COMMIT_TAG" --description "Release $CI_COMMIT_TAG")
      for f in dist/*; do
        [ -f "$f" ] || continue
        BASENAME=$(basename "$f")
        CMD+=(--assets-link "name=$BASENAME;filepath=$f")
      done
      echo "Running: ${CMD[*]}"
      "${CMD[@]}"
  release:
    name: "$CI_PROJECT_TITLE $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    description: |
      Release $CI_COMMIT_TAG
      Built release artifacts are available in pipeline jobs.
